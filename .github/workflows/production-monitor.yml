name: Production monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run private production smoke test when configured
        env:
          INBRIDGE_BASE_URL: ${{ secrets.INBRIDGE_BASE_URL }}
        run: |
          if [ -z "$INBRIDGE_BASE_URL" ]; then
            echo "::notice::Production monitor skipped because INBRIDGE_BASE_URL is not configured."
            exit 0
          fi
          npm run smoke
